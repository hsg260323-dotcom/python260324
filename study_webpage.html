<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5, CSS3, JavaScript 학습 페이지</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #333;
            transition: color 0.3s;
        }
        h1:hover {
            color: #007bff;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #218838;
        }
        #message {
            margin-top: 20px;
            font-size: 18px;
            color: #555;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>HTML5, CSS3, JavaScript 학습 페이지</h1>
        <p>이 페이지는 HTML5 구조, CSS3 스타일링, JavaScript 상호작용을 포함한 간단한 예제입니다.</p>
        <button id="clickButton">클릭하세요!</button>
        <div id="message"></div>
    </div>

    <script>
        document.getElementById('clickButton').addEventListener('click', function() {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = '버튼을 클릭했습니다! JavaScript가 작동합니다.';
            messageDiv.style.color = 'green';
        });
    </script>
</body>
</html>
